                                                                                <!-- Companies drop down here -->
                                                                                            </select>
                                                                                                    </div>
                                                                                                        </header>

                                                                                                            <main style="padding: 20px;">
                                                                                                                    <!-- Create Company Card -->
                                                                                                                            <section class="card" style="border-left: 5px solid #2563eb; padding: 15px; margin-bottom: 20px; background: #f8fafc;">
                                                                                                                                        <h3>Create New Company</h3>
                                                                                                                                                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                                                                                                                                                                    <input type="text" id="newCompanyName" placeholder="Enter Company Name" style="padding: 8px; flex: 1;">
                                                                                                                                                                                    <button id="addCompanyBtn" type="button" style="padding: 8px 16px; background-color: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer;">
                                                                                                                                                                                                        + Add Company
                                                                                                                                                                                                                        </button>
                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                            </section>

                                                                                                                                                                                                                                                    <!-- Financial Tracker Card -->

                                                                                                                                                                                                                                                                        <h3>Add Financial Record</h3>

                                                                                                                                                                                                                                                                                                    <input type="number" id="financeAmount" placeholder="Amount ($)" required style="padding: 8px; margin-right: 10px;">
                                                                                                                                                                                                                                                                                                                    <select id="financeType" style="padding: 8px; margin-right: 10px;">
                                                                                                                                                                                                                                                                                                                                        <option value="income">Income</option>
                                                                                                                                                                                                                                                                                                                                                            <option value="expense">Expense</option>
                                                                                                                                                                                                                                                                                                                                                                            </select>

                                                                                                                                                                                                                                                                                                                                                                                                        </form>

                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="financeList"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                        </section>

                                                                                                                                                                                                                                                                                                                                                                                                                                                <!-- Orders Tracker Card -->

                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h3>Log New Order</h3>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <input type="text" id="clientName" placeholder="Client Name" required style="padding: 8px; margin-right: 10px;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <input type="number" id="orderTotal" placeholder="Order Total ($)" required style="padding: 8px; margin-right: 10px;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button type="submit" style="padding: 8px 15px; cursor: pointer;">Place Order</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </form>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <h4>Saved Orders:</h4>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div id="orderList"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </section>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <!-- Employee Directory Card -->

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <h3>Register Employee</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <form id="employeeForm" style="margin-bottom: 15px;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="text" id="employeeName" placeholder="Full Name" required style="padding: 8px; margin-right: 10px;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <input type="text" id="employeeRole" placeholder="Role / Position" required style="padding: 8px; margin-right: 10px;">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <button type="submit" style="padding: 8px 15px; cursor: pointer;">Add Employee</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </form>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </main>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <script src="app.js"></script>
